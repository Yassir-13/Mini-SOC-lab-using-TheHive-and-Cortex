# =============================================================
# Cortex Application Configuration
# =============================================================

# Secret key for session management
play.http.secret.key="CortexSecretKey_ChangeMe_2026!"

# HTTP server settings
http.address = 0.0.0.0
http.port = 9001

# Akka settings (single node, no cluster)
akka {
  cluster.enable = off
  actor {
    provider = local
  }
}

# Elasticsearch settings
search {
  index = cortex
  uri = "http://elasticsearch:9200/"
}

# Cache settings
cache.job = 10 minutes
cache.user = 5 minutes
cache.organization = 5 minutes

# Job runner: use Docker to run analyzers/responders
job {
  runner = [docker]
}

# Docker job runner configuration
dockerJobRunner {
  directory = /tmp/cortex-jobs
  timeout = 30 minutes
  dockerExecutable = "docker"
}

# Analyzer configuration
analyzer {
  config {
    # Uncomment and configure if you use a proxy
    # proxy.host = proxy.example.com
    # proxy.port = 3128
  }

  # Use the default TheHive Project analyzer catalog
  urls = [
    "https://download.thehive-project.org/analyzers.json"
  ]
}

# Responder configuration
responder {
  config {
    # Uncomment and configure if you use a proxy
    # proxy.host = proxy.example.com
    # proxy.port = 3128
  }

  # Use the default TheHive Project responder catalog
  urls = [
    "https://download.thehive-project.org/responders.json"
  ]
}
